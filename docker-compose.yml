services:

  # -------------------------
  # Laravel (PHP-FPM)
  # -------------------------
  laravel:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: emk_laravel_prod
    container_name: emk_laravel
    env_file:
      - ./.env
    environment:
      APP_ENV: "${APP_ENV:-production}"
      SPRING_BASE_URL: "http://spring:8085"
      DJANGO_BASE_URL: "http://django:8084"
      NODE_BASE_URL: "http://node:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - laravel_public:/var/www
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Reverse proxy / Web (Nginx)
  # -------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: emk_nginx
    depends_on:
      - laravel
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - laravel_public:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Django (AHORA 8084)
  # -------------------------
  django:
    build:
      context: ../emk-reports
      dockerfile: Dockerfile
    image: emk_django_prod
    container_name: emk_django
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8084
    ports:
      - "8084:8084"
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Spring Boot (8085)
  # -------------------------
  spring:
    build:
      context: ../financial-planing
      dockerfile: Dockerfile
    image: emk_spring_prod
    env_file:
    - ../financial-planing/.env
    container_name: emk_spring
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Node.js (3000)
  # -------------------------
  node:
    build:
      context: ../emk-sena-rsr-expenses-back
      dockerfile: Dockerfile
    image: emk_node_prod
    container_name: emk_node
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    command: npm start
    networks:
      - emk_net
    restart: unless-stopped

networks:
  emk_net:
    driver: bridge

volumes:
  laravel_public:
