services:

  # -------------------------
  # Laravel (PHP-FPM)
  # -------------------------
  laravel:
    image: "ghcr.io/emksas/emk-front:prod-latest"
    container_name: emk_laravel
    working_dir: /var/www
    env_file:
      - ./.env
    environment:
      APP_ENV: "${APP_ENV:-production}"
      SPRING_BASE_URL: "http://spring:8085"
      DJANGO_BASE_URL: "http://django:8084"
      NODE_BASE_URL: "http://node:8086"
    volumes:
      - ./:/var/www
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Reverse proxy / Web (Nginx)
  # -------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: emk_nginx
    depends_on:
      - laravel
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Django (AHORA 8084)
  # -------------------------
  django:
    build:
      context: ./django
      dockerfile: Dockerfile
    container_name: emk_django
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8084
    volumes:
      - ./django:/app
    ports:
      - "8084:8084"
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Spring Boot (8085)
  # -------------------------
  spring:
    build:
      context: ./spring
      dockerfile: Dockerfile
    container_name: emk_spring
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Node.js (8086)
  # -------------------------
  node:
    build:
      context: ./node
      dockerfile: Dockerfile
    container_name: emk_node
    working_dir: /app
    ports:
      - "8086:8086"
    environment:
      PORT: 8086
    volumes:
      - ./node:/app
      - /app/node_modules
    command: npm start
    networks:
      - emk_net
    restart: unless-stopped

networks:
  emk_net:
    driver: bridge

volumes:
  laravel_public: