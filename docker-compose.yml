services:

  # -------------------------
  # Laravel (PHP-FPM)
  # -------------------------
  laravel:
    image: ghcr.io/emksas/emk-front:prod-latest
    container_name: emk_laravel
    env_file:
      - ./.env
    environment:
      APP_ENV: "${APP_ENV:-production}"
      SPRING_BASE_URL: "http://spring:8085"
      DJANGO_BASE_URL: "http://django:8084"
      NODE_BASE_URL: "http://node:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Reverse proxy / Web (Nginx)
  # -------------------------
  nginx:
    image: ghcr.io/emksas/emk-front-nginx:prod-latest
    container_name: emk_nginx
    depends_on:
      - laravel
    ports:
      - "127.0.0.1:8081:80"
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Django (AHORA 8084)
  # -------------------------
  django:
    image: ghcr.io/emksas/emk-reports:prod-latest
    container_name: emk_django
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8084
    ports:
      - "8084:8084"
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Spring Boot (8085)
  # -------------------------
  spring:
    image: ghcr.io/emksas/financial-planing:prod-latest
    env_file:
    - ../financial-planing/.env
    container_name: emk_spring
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
    networks:
      - emk_net
    restart: unless-stopped

  # -------------------------
  # Node.js (3000)
  # -------------------------
  node:
    image: ghcr.io/emksas/emk-sena-rsr-expenses-back:prod-latest
    container_name: emk_node
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
    command: npm start
    networks:
      - emk_net
    restart: unless-stopped

networks:
  emk_net:
    driver: bridge
