name: Build & Deploy

on:
  push:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Run unit tests
        run: php vendor/bin/phpunit tests/Unit/Services tests/Unit/Requests

      - name: Set image tag
        id: vars
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ]; then
            echo "tag=prod-latest" >> $GITHUB_OUTPUT
          else
            echo "tag=develop-latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Laravel image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: |
            ghcr.io/emksas/emk-front:${{ steps.vars.outputs.tag }}
            ghcr.io/emksas/emk-front:${{ github.sha }}

      - name: Build & Push Nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/nginx/Dockerfile
          build-args: |
            LARAVEL_IMAGE=ghcr.io/emksas/emk-front:${{ github.sha }}
          push: true
          tags: |
            ghcr.io/emksas/emk-front-nginx:${{ steps.vars.outputs.tag }}
            ghcr.io/emksas/emk-front-nginx:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    # main => production, todo lo demás => dev (o staging)
    environment: ${{ github.ref_name == 'main' && 'production' || 'dev' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            echo "Deploying branch: ${{ github.ref_name }}"
            git fetch --all --prune

            git checkout "${{ github.ref_name }}"
            git reset --hard "origin/${{ github.ref_name }}"
            git clean -fd

            docker compose -f docker-compose.yml pull
            docker compose -f docker-compose.yml up -d --remove-orphans
            docker compose -f docker-compose.yml ps
            docker compose -f docker-compose.yml logs --tail=80 nginx laravel
            docker image prune -f
