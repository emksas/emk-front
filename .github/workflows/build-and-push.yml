name: Build & Push Image

on:
  push:
    branches: ["develop", "main", "feat/auto-deploy-actions"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=prod-latest" >> $GITHUB_OUTPUT
          else
            echo "tag=develop-latest" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ghcr.io/emksas/emk-front:${{ steps.vars.outputs.tag }}

      - name: Trigger deploy (compose repo)
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TRIGGER_TOKEN }}
          repository: emksas/emk-front
          event-type: deploy
          client-payload: |
            {"branch":"${{ github.ref_name }}","service":"${{ github.repository }}"}

  deploy:
    runs-on: ubuntu-latest
    environment: dev
    needs: build
    steps:
      - name: Decide environment
        id: env
        run: |
          run: |
          BRANCH='${{ github.event.client_payload.branch }}'
          if [ "$BRANCH" = "main" ]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "branch=main" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "branch=${{ github.event.client_payload.branch }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all
            git checkout ${{ github.event.client_payload.branch }}
            git pull origin ${{ github.event.client_payload.branch }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
