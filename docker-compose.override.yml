services:
  laravel:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: emk_laravel_local
    pull_policy: build
    env_file: !override
      - ./.env
    volumes:
      - ./:/var/www

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  django:
    build:
      context: ../emk-reports
      dockerfile: Dockerfile
    image: emk_django_local
    pull_policy: build
    env_file: !override
      - ../emk-reports/.env
    command: python manage.py runserver 0.0.0.0:8084
    volumes:
      - ../emk-reports:/app

  
  spring:
    image: maven:3.9-eclipse-temurin-21
    env_file: !override
      - ../financial-planing/.env
    working_dir: /app
    volumes:
      - ../financial-planing:/app
      - ~/.m2:/root/.m2
    entrypoint: []
    command: mvn spring-boot:run
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
  
  node:
    build:
      context: ../emk-sena-rsr-expenses-back
      dockerfile: Dockerfile
    image: emk_node_local
    pull_policy: build
    env_file: !override
      - ../emk-sena-rsr-expenses-back/.env
    volumes:
      - ../emk-sena-rsr-expenses-back:/app
      - /app/node_modules
    command: npm start
