services:
  laravel:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    image: emk_laravel_local
    pull_policy: build
    volumes:
      - ./:/var/www

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  django:
    build:
      context: ../emk-reports
      dockerfile: Dockerfile
    image: emk_django_local
    pull_policy: build
    command: python manage.py runserver 0.0.0.0:8084
    volumes:
      - ../emk-reports:/app

  
  spring:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ../financial-planing:/app
      - ~/.m2:/root/.m2
    entrypoint: []
    command: mvn spring-boot:run
    ports:
      - "8085:8085"
    environment:
      SERVER_PORT: 8085
  
  node:
    build:
      context: ../emk-sena-rsr-expenses-back
      dockerfile: Dockerfile
    image: emk_node_local
    pull_policy: build
    volumes:
      - ../emk-sena-rsr-expenses-back:/app
      - /app/node_modules
    command: npm start

  locust:
    image: locustio/locust:latest
    container_name: emk_locust
    depends_on:
      - nginx
    env_file:
      - .env
    environment:
      LOCUST_HOST: http://nginx
    ports:
      - "8089:8089"
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py:ro
    command: -f /mnt/locust/locustfile.py --web-host=0.0.0.0
    networks:
      - emk_net
